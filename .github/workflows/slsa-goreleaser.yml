name: SLSA Go Builder

on:
  push:
    tags:
      - 'v*.*.*'

permissions: read-all

jobs:
  build:
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v1.5.0
    with:
      go-version: 1.19
      config-file: .slsa-goreleaser.yml
